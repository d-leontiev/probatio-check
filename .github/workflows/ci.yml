name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - name: Install (dev extra; hermetic tests need no local models)
        run: pip install -e '.[dev]'
      - name: Ruff
        run: ruff check probatio tests
      - name: Mypy
        run: mypy probatio
      - name: Pytest (integration tests are deselected by pyproject addopts)
        run: pytest -q
